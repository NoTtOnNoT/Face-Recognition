<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SMTE | AI Face Recognition System</title>

        <script
            src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

        <script defer
            src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

        <script defer src="script.js"></script>

        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <aside class="sidebar-desktop">
            <div class="sidebar-header">
                <h2><i class="fas fa-history"></i> SMTE-Check Log</h2>
            </div>
            <div id="logListDesktop" class="log-container"></div>
        </aside>

        <main class="main-content">
            <div id="status" class="status-badge">Initializing...</div>

            <div class="camera-wrapper">
                <div class="camera-container">
                    <div id="scanNotice" class="scan-notification">
                        <i class="fas fa-check-circle"></i>
                        <span id="noticeText">พบข้อมูล: กำลังบันทึก...</span>
                    </div>

                    <video id="video" autoplay muted playsinline></video>
                    <button id="flipBtn"><i
                            class="fas fa-sync-alt"></i></button>
                </div>
            </div>

            <button id="mobileLogBtn" class="mobile-only-btn"
                onclick="toggleMobileLog()">
                <i class="fas fa-history"></i> ดูประวัติย้อนหลัง
            </button>
        </main>

        <div id="mobileLogModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Attendance History</h3>
                    <span class="close"
                        onclick="toggleMobileLog()">&times;</span>
                </div>
                <div id="logListMobile" class="log-container"></div>
            </div>
        </div>

        <div id="mobileLogModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-clock"></i> ประวัติการสแกน</h3>
                    <span class="close"
                        onclick="toggleMobileLog()">&times;</span>
                </div>
                <div id="logListMobile" class="log-container">
                </div>
            </div>
        </div>
    </body>
</html>
