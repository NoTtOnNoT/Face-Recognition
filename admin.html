<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Attendance System</title>
    
    <script>
        // ตรวจสอบสิทธิ์ผ่าน localStorage (ล็อกอินค้าง)
        if (localStorage.getItem('isAdminPersistent') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg: #0b0c10;
            --panel: #1f2833;
            --panel-light: #2c3540;
            --primary: #66fcf1;
            --primary-dark: #45b1a8;
            --danger: #ff4d6d;
            --danger-hover: #cc3b54;
            --text: #ffffff;
            --text-muted: #c5c6c7;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* ฝั่งซ้าย: แถบรายชื่อ */
        .sidebar { 
            width: 380px; 
            background: #141a24;
            border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; 
            flex-direction: column; 
        }
        
        .sidebar-header { 
            padding: 24px; 
            background: #1a222f; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        .sidebar-header h2 { 
            margin: 0; 
            font-size: 1.3rem; 
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar-header p { 
            font-size: 13px; 
            color: #6c7293; 
            margin: 6px 0 16px 0; 
        }
        
        .action-group { 
            display: flex; 
            gap: 10px; 
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        
        .btn-logout { background: #252e3c; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05); }
        .btn-logout:hover { background: #2f3a4c; color: white; }
        
        .btn-danger { background: rgba(255, 77, 109, 0.15); color: var(--danger); border: 1px solid rgba(255, 77, 109, 0.2); }
        .btn-danger:hover { background: var(--danger); color: #0b0c10; }

        .log-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px; 
        }
        
        /* สไตล์ไอเทมแต่ละคน */
        .log-card-item { 
            background: #1c2431; 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.25s ease; 
            border: 1px solid transparent;
        }
        
        .log-card-item:hover { 
            background: #232d3d; 
            transform: translateX(4px);
        }
        
        .log-card-item.active { 
            background: rgba(102, 252, 241, 0.08); 
            border-color: var(--primary); 
        }
        
        .user-info strong { 
            display: block; 
            color: white; 
            font-size: 15px;
            margin-bottom: 6px; 
            transition: color 0.2s;
        }
        .log-card-item.active .user-info strong { color: var(--primary); }
        
        .user-info span { 
            font-size: 12px; 
            color: #8f94a6; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-trash { 
            background: rgba(255,255,255,0.02); 
            border: none; 
            color: #4f5573; 
            cursor: pointer; 
            width: 36px;
            height: 36px;
            border-radius: 8px; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s; 
            opacity: 0.6;
        }
        .log-card-item:hover .btn-trash { opacity: 1; }
        .btn-trash:hover { background: rgba(255, 77, 109, 0.15); color: var(--danger); }

        /* ฝั่งขวา: จอแสดงรูปภาพขนาดใหญ่ */
        .viewer-main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            background: #090d14; 
        }
        
        .image-frame {
            max-width: 85%;
            max-height: 70vh;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: none;
            object-fit: contain;
            background: #141a24;
        }
        
        .empty-state { 
            color: #393e46; 
            text-align: center; 
            transition: color 0.3s;
        }
        .empty-state i { font-size: 90px; margin-bottom: 15px; color: #1c2431; }
        .empty-state h3 { margin: 0; font-weight: 500; color: #4f5573; }

        .details-box { 
            margin-top: 24px; 
            text-align: center; 
            display: none;
            background: #141a24;
            padding: 16px 40px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .details-box h2 { color: var(--primary); margin: 0 0 6px 0; font-weight: 600; font-size: 1.4rem; }
        .details-box p { color: #8f94a6; margin: 0; font-size: 13px; }

        /* ปรับแต่งความสวยงามของแถบเลื่อน (Scrollbar) */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #232d3d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2c394e; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-id-card-alt"></i> Dashboard Logs</h2>
            <p>เลือกรายชื่อเพื่อตรวจสอบรูปภาพหลักฐานจากกล้อง</p>
            <div class="action-group">
                <button class="btn btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกระบบ</button>
                <button class="btn btn-danger" onclick="clearAllData()"><i class="fas fa-dumpster"></i> ล้างทั้งหมด</button>
            </div>
        </div>
        <div id="logList" class="log-container"></div>
    </div>

    <div class="viewer-main" id="viewPanel">
        <div class="empty-state" id="placeholder">
            <i class="fas fa-user-astronaut"></i>
            <h3>คลิกเลือกรายชื่อเพื่อเปิดดูรูปถ่ายเช็คอิน</h3>
        </div>
        <img src="" id="fullImage" class="image-frame">
        <div id="details" class="details-box">
            <h2 id="viewName"></h2>
            <p id="viewTime"></p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDtIQFbkkS_9Va7N972fhZ-pQN9zN2i4uc",
            authDomain: "projectm5-69d17.firebaseapp.com",
            databaseURL: "https://projectm5-69d17-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "projectm5-69d17",
            storageBucket: "projectm5-69d17.firebasestorage.app",
            messagingSenderId: "480347312274",
            appId: "1:480347312274:web:20b70500dbf52f4f4d164b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function logout() {
            if(confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) {
                localStorage.removeItem('isAdminPersistent'); // ลบสถานะล็อกอินค้าง
                window.location.href = 'login.html';
            }
        }

        // ดึงข้อมูล Realtime
        db.ref('attendance').on('value', (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('logList');
            listDiv.innerHTML = "";

            if(!data) {
                listDiv.innerHTML = "<p style='text-align:center; color:#4f5573; margin-top:20px;'>ไม่มีประวัติการเช็คอิน</p>";
                resetViewer();
                return;
            }

            const items = Object.keys(data).map(key => ({
                id: key,
                ...data[key]
            })).reverse();

            items.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'log-card-item';
                itemEl.onclick = () => showPhoto(item.image, item.name, item.timeDisplay, itemEl);
                
                itemEl.innerHTML = `
                    <div class="user-info">
                        <strong>${item.name}</strong>
                        <span><i class="far fa-clock"></i> ${item.timeDisplay}</span>
                    </div>
                    <button class="btn-trash" onclick="deleteEntry(event, '${item.id}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                listDiv.appendChild(itemEl);
            });
        });

        function showPhoto(imgUrl, name, time, element) {
            document.querySelectorAll('.log-card-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('fullImage').style.display = 'block';
            document.getElementById('details').style.display = 'block';

            document.getElementById('fullImage').src = imgUrl;
            document.getElementById('viewName').innerText = name;
            document.getElementById('viewTime').innerText = `บันทึกเมื่อ: ${time}`;
        }

        function deleteEntry(event, id) {
            event.stopPropagation(); // ห้ามไม่ให้กระโดดไปทำงานที่ Event ตัวคลิกดูรูปภาพ
            if(confirm("ต้องการลบประวัติของรายการนี้ใช่หรือไม่?")) {
                db.ref('attendance/' + id).remove().then(() => {
                    resetViewer();
                });
            }
        }

        function clearAllData() {
            if(confirm("⚠️ คำเตือน! คุณต้องการล้างข้อมูลทั้งหมดบนคลาวด์ใช่หรือไม่? ข้อมูลจะหายถาวร")) {
                db.ref('attendance').remove().then(() => {
                    resetViewer();
                });
            }
        }

        function resetViewer() {
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('fullImage').style.display = 'none';
            document.getElementById('details').style.display = 'none';
        }
    </script>
</body>
</html>
