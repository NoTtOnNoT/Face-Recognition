<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Panel | Attendance System</title>
        <script
            src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #4ecca3;
            --danger: #e94560;
            --text: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }

        /* แถบซ้าย: รายชื่อ */
        .list-panel { width: 400px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .list-header { padding: 20px; background: var(--card); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .log-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .log-item { 
            background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; border: 1px solid transparent;
        }
        .log-item:hover { border-color: var(--primary); background: #1f2d50; }
        .log-item.active { border-color: var(--primary); background: rgba(78, 204, 163, 0.1); }
        
        .info-text strong { display: block; color: var(--primary); margin-bottom: 3px; }
        .info-text span { font-size: 12px; color: #888; }
        
        .btn-del-single { background: none; border: none; color: #555; cursor: pointer; padding: 10px; transition: 0.2s; }
        .btn-del-single:hover { color: var(--danger); }

        /* ฝั่งขวา: แสดงรูป */
        .view-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: #101026; }
        .photo-viewer { max-width: 90%; max-height: 80vh; border-radius: 20px; border: 5px solid var(--card); box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: none; }
        .placeholder { color: #444; text-align: center; }
        .placeholder i { font-size: 80px; margin-bottom: 10px; }

        .btn-clear-all { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; float: right; font-size: 12px; }
    </style>
    </head>
    <body>

        <div class="list-panel">
            <div class="list-header">
                <h2 style="margin:0; font-size: 1.2rem;"><i
                        class="fas fa-users-cog"></i> Admin Log</h2>
                <p
                    style="font-size: 12px; color: #888;">คลิกที่ชื่อเพื่อดูรูปหลักฐาน</p>
                <button class="btn-clear-all"
                    onclick="clearAllData()">ล้างทั้งหมด</button>
            </div>
            <div id="logList" class="log-list">
            </div>
        </div>

        <div class="view-panel" id="viewPanel">
            <div class="placeholder" id="placeholder">
                <i class="fas fa-camera-retro"></i>
                <h3>Select a user to view photo</h3>
            </div>
            <img src id="fullImage" class="photo-viewer">
            <div id="details"
                style="margin-top: 20px; text-align: center; display:none;">
                <h2 id="viewName" style="color:var(--primary); margin:0;"></h2>
                <p id="viewTime" style="color:#888;"></p>
            </div>
        </div>

        <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDtIQFbkkS_9Va7N972fhZ-pQN9zN2i4uc",
            authDomain: "projectm5-69d17.firebaseapp.com",
            databaseURL: "https://projectm5-69d17-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "projectm5-69d17",
            storageBucket: "projectm5-69d17.firebasestorage.app",
            messagingSenderId: "480347312274",
            appId: "1:480347312274:web:20b70500dbf52f4f4d164b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        if (sessionStorage.getItem('isAdmin') !== 'true') {
        window.location.href = 'login.html';
    }

    // ฟังก์ชัน Logout (เพิ่มปุ่มนี้ไว้ที่หน้า Admin ด้วยก็ได้)
    function logout() {
        sessionStorage.removeItem('isAdmin');
        window.location.href = 'login.html';
    }

        // โหลดข้อมูล
        db.ref('attendance').on('value', (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('logList');
            listDiv.innerHTML = "";

            if(!data) {
                listDiv.innerHTML = "<p style='text-align:center; color:#555;'>ไม่มีข้อมูล</p>";
                resetViewer();
                return;
            }

            // แปลง Object เป็น Array และใส่ Key ของ Firebase ลงไปด้วยเพื่อใช้ลบ
            const items = Object.keys(data).map(key => ({
                id: key,
                ...data[key]
            })).reverse();

            items.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'log-item';
                itemEl.onclick = () => showPhoto(item.image, item.name, item.timeDisplay, itemEl);
                
                itemEl.innerHTML = `
                    <div class="info-text">
                        <strong>${item.name}</strong>
                        <span><i class="far fa-calendar-alt"></i> ${item.timeDisplay}</span>
                    </div>
                    <button class="btn-del-single" onclick="deleteEntry(event, '${item.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                listDiv.appendChild(itemEl);
            });
        });

        // แสดงรูป
        function showPhoto(imgUrl, name, time, element) {
            // ลบ class active จากตัวอื่น
            document.querySelectorAll('.log-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('fullImage').style.display = 'block';
            document.getElementById('details').style.display = 'block';

            document.getElementById('fullImage').src = imgUrl;
            document.getElementById('viewName').innerText = name;
            document.getElementById('viewTime').innerText = time;
        }

        // ลบทีละคน
        function deleteEntry(event, id) {
            event.stopPropagation(); // กันไม่ให้ไปกดโดนฟังก์ชันเปิดดูรูป
            if(confirm("ลบข้อมูลรายการนี้?")) {
                db.ref('attendance/' + id).remove().then(() => {
                    resetViewer();
                });
            }
        }

        // ล้างทั้งหมด
        function clearAllData() {
            if(confirm("ล้างประวัติทั้งหมดหรือไม่?")) {
                db.ref('attendance').remove();
            }
        }

        function resetViewer() {
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('fullImage').style.display = 'none';
            document.getElementById('details').style.display = 'none';
        }
    </script>
    </body>
</html>
