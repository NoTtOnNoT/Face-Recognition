<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <h3>Face Descriptor Generator</h3>
    <button onclick="generateJSON()">เริ่มประมวลผลและดาวน์โหลด JSON</button>
    <pre id="log"></pre>

    <script>
        async function generateJSON() {
            const log = document.getElementById('log');
            log.innerText = "กำลังโหลด Models...";
            
            await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('/models');

            const labels = ['Kittipat', 'Sangarun', 'Jiragrit', 'Napasiri', 'Kru_Euro'];
            const result = [];

            for (const label of labels) {
                log.innerText += `\nกำลังประมวลผล: ${label}...`;
                const descriptions = [];
                
                for (let i = 1; i <= 3; i++) {
                    try {
                        const img = await faceapi.fetchImage(`/labeled_images/${label}/${i}.jpg`);
                        const detection = await faceapi.detectSingleFace(img)
                            .withFaceLandmarks()
                            .withFaceDescriptor();
                        
                        if (detection) {
                            // แปลง Float32Array เป็น Array ปกติเพื่อให้เซฟเป็น JSON ได้
                            descriptions.push(Array.from(detection.descriptor));
                        }
                    } catch (e) {
                        console.warn(`ข้ามไฟล์ ${label}/${i}.jpg`);
                    }
                }
                
                if (descriptions.length > 0) {
                    result.push({ label, descriptors: descriptions });
                }
            }

            // สร้างไฟล์ JSON ให้ดาวน์โหลด
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(result));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "descriptors.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            
            log.innerText += "\nเสร็จสิ้น! ไฟล์ descriptors.json ถูกดาวน์โหลดแล้ว";
        }
    </script>
</body>
</html>
