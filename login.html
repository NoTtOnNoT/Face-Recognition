<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Face Recognition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bg: #0d0e15;
            --panel: rgba(30, 32, 50, 0.7);
            --primary: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.3);
            --danger: #ff4d6d;
            --text: #ffffff;
            --input-bg: #161824;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center, #1e203c 0%, var(--bg) 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .login-card { 
            background: var(--panel); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 30px var(--primary-glow);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(0, 242, 254, 0.1);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            border: 1px solid rgba(0, 242, 254, 0.2);
            color: var(--primary);
            font-size: 36px;
            text-shadow: 0 0 10px var(--primary);
        }

        h2 { 
            color: var(--text); 
            margin: 0 0 8px 0; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            color: #6c7293;
            margin: 0 0 30px 0;
            font-size: 14px;
        }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 16px; top: 16px; color: #4f5573; transition: color 0.3s; }
        
        input { 
            width: 100%; 
            padding: 14px 14px 14px 48px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
            background: var(--input-bg); 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 15px;
            transition: all 0.3s; 
        }

        input:focus { 
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        input:focus + i {
            color: var(--primary);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(45deg, #00f2fe, #4facfe); 
            color: #0d0e15; 
            font-weight: 600; 
            font-size: 16px;
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 10px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        button:hover { 
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        #errorMsg { 
            color: var(--danger); 
            font-size: 14px; 
            margin-top: 20px; 
            display: none; 
            background: rgba(255, 77, 109, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 77, 109, 0.2);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="icon-box">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h2>Admin Panel</h2>
        <p class="subtitle">ระบบจัดการข้อมูลและตรวจสอบใบหน้า</p>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
            <i class="fas fa-user"></i>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="รหัสผ่าน">
            <i class="fas fa-lock"></i>
        </div>
        <button onclick="login()">เข้าสู่ระบบ</button>
        <p id="errorMsg"><i class="fas fa-exclamation-circle"></i> บัญชีหรือรหัสผ่านไม่ถูกต้อง</p>
    </div>

    <script>
        // เผื่อมีใครแอบกดเข้ามาทั้งที่ล็อกอินค้างไว้แล้ว ให้ส่งไปหน้าแอดมินเลย
        if (localStorage.getItem('isAdminPersistent') === 'true') {
            window.location.href = 'admin.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDtIQFbkkS_9Va7N972fhZ-pQN9zN2i4uc",
            authDomain: "projectm5-69d17.firebaseapp.com",
            databaseURL: "https://projectm5-69d17-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "projectm5-69d17",
            storageBucket: "projectm5-69d17.firebasestorage.app",
            messagingSenderId: "480347312274",
            appId: "1:480347312274:web:20b70500dbf52f4f4d164b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function login() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const snapshot = await db.ref('admin_config').once('value');
                const adminData = snapshot.val();

                if (userIn === adminData.username && passIn === adminData.password) {
                    // เปลี่ยนมาใช้ localStorage เพื่อให้ระบบจำสถานะล็อกอินค้างไว้ตลอดไป
                    localStorage.setItem('isAdminPersistent', 'true');
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล");
            }
        }
    </script>
</body>
</html>
